name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-core:
    name: Core Checks (Linux)
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
      UV_TOOL_DIR: ${{ github.workspace }}/.uv-tools
      # Use the pre-installed biome binary instead of `npx --yes` (slow cold path).
      BIOME: biome
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: linux-stable-1.91
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22.x"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"

      - name: Setup uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3

      - name: Cache uv tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .uv-cache
            .uv-tools
          key: uv-${{ runner.os }}-yamllint-1.38.0-jsonschema-0.36.1
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Cache .bin (yamlfmt, actionlint)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .bin
          key: bin-${{ runner.os }}-yamlfmt-v0.15.0
          restore-keys: |
            bin-${{ runner.os }}-

      # Pre-install Biome and cargo-nextest as binaries (faster than npx/cargo install).
      - name: Pre-install binary tools
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2
        with:
          tool: biome@2.3.11,cargo-nextest

      - name: Install core check tooling
        run: make install-tools-core

      - name: Run core checks
        run: make check-core

  rust-macos:
    name: Rust Checks (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: macos-stable-1.91
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Pre-install cargo-nextest
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2
        with:
          tool: cargo-nextest

      - name: Run Rust checks
        run: make check-rust

  msrv:
    name: MSRV Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(grep '^rust-version' Cargo.toml | sed 's/rust-version = "\(.*\)"/\1/')
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
          echo "Using MSRV: $MSRV"

      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Pre-install cargo-msrv as a binary; replaces `make install-tools-msrv`
      # (which would `cargo install` from source). check-msrv validates the
      # binary is on PATH via check-tools-msrv. Keep version in sync with the
      # Makefile's `install-cargo-msrv` target.
      - name: Pre-install cargo-msrv
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2
        with:
          tool: cargo-msrv@0.19.3

      - name: Run MSRV checks
        run: make check-msrv

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: 1.91.1

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: linux-stable-1.91
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Pre-install security tools as binaries; replaces
      # `make install-tools-security` (which would `cargo install` from source
      # and fail with "binary already exists" because cargo-audit/cargo-machete
      # are unpinned in the Makefile). check-security validates binaries are on
      # PATH via check-tools-security.
      - name: Pre-install security tools
        uses: taiki-e/install-action@481c34c1cf3a84c68b5e46f4eccfc82af798415a # v2
        with:
          tool: cargo-audit,cargo-machete,typos@1.32.0

      - name: Run security checks
        run: make check-security
